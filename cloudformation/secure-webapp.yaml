AWSTemplateFormatVersion: '2010-09-09'
Description: Secure two-tier web application starter with ALB, EC2, and AWS WAF

Parameters:
  VpcCidr:
    Type: String
    Default: 10.30.0.0/16

  PublicSubnet1Cidr:
    Type: String
    Default: 10.30.1.0/24

  PublicSubnet2Cidr:
    Type: String
    Default: 10.30.2.0/24

  AllowedAdminCidr:
    Type: String
    Default: 0.0.0.0/0
    Description: CIDR allowed to SSH to the EC2 instance

  BlockedIpCidr:
    Type: String
    Default: 203.0.113.0/24
    Description: Example IP range to block in WAF

  AmiId:
    Type: AWS::EC2::Image::Id
    Description: AMI ID for the web server

  KeyName:
    Type: AWS::EC2::KeyPair::KeyName
    Description: Existing EC2 KeyPair for SSH access

Resources:
  SecurityVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: security-webapp-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: security-webapp-igw

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref SecurityVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SecurityVPC
      CidrBlock: !Ref PublicSubnet1Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: security-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SecurityVPC
      CidrBlock: !Ref PublicSubnet2Cidr
      MapPublicIpOnLaunch: true
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: security-public-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SecurityVPC
      Tags:
        - Key: Name
          Value: security-public-rt

  DefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: AttachGateway
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  AlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP from the internet to the ALB
      VpcId: !Ref SecurityVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: alb-security-group

  WebServerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP only from the ALB and SSH from admin CIDR
      VpcId: !Ref SecurityVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSecurityGroup
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref AllowedAdminCidr
      Tags:
        - Key: Name
          Value: webserver-security-group

  WebServer:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: t3.micro
      KeyName: !Ref KeyName
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref WebServerSecurityGroup
      UserData:
        Fn::Base64: |
          #!/bin/bash
          dnf install -y httpd || yum install -y httpd
          systemctl enable httpd
          systemctl start httpd
          echo "Secure AWS Web Application" > /var/www/html/index.html
      Tags:
        - Key: Name
          Value: secure-web-server

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: secure-webapp-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroup
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  WebTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: secure-webapp-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref SecurityVPC
      HealthCheckPath: /
      TargetType: instance
      Targets:
        - Id: !Ref WebServer

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref WebTargetGroup

  BlockedIpSet:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: blocked-ip-set
      Scope: REGIONAL
      IPAddressVersion: IPV4
      Addresses:
        - !Ref BlockedIpCidr

  WebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: secure-webapp-webacl
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: secureWebAcl
        SampledRequestsEnabled: true
      Rules:
        - Name: BlockSpecificIPs
          Priority: 0
          Action:
            Block: {}
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt BlockedIpSet.Arn
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: blockSpecificIps
            SampledRequestsEnabled: true
        - Name: AWSManagedCommonRules
          Priority: 1
          OverrideAction:
            None: {}
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: awsManagedCommonRules
            SampledRequestsEnabled: true

  WebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref ApplicationLoadBalancer
      WebACLArn: !GetAtt WebAcl.Arn

Outputs:
  LoadBalancerDNS:
    Description: DNS name of the ALB
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  WebAclArn:
    Description: ARN of the WAF Web ACL
    Value: !GetAtt WebAcl.Arn